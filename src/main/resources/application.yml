spring:
  application:
    name: training_platform_v1
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/training_platform_v1?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:training_user}
    password: ${DB_PASSWORD:training_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    placeholders:
      "[admin_default_password]": ${ADMIN_DEFAULT_PASSWORD:ChangeMe123!}
      "[admin_default_password_bcrypt]": ${ADMIN_DEFAULT_PASSWORD_BCRYPT:$2b$12$HXA6msnqqJT.Ef13jSbkBuG0AYfuPa7tFqLiFcqLzUQUMGGoaM0XW}

doma:
  dialect: mysql

app:
  jwt:
    secret: ${JWT_SECRET:replace-this-with-a-long-random-secret-32-char-minimum}
    access-ttl-seconds: ${JWT_ACCESS_TTL_SECONDS:900}
    refresh-ttl-seconds: ${JWT_REFRESH_TTL_SECONDS:1209600}
  storage:
    root: ${APP_STORAGE_ROOT:./var/storage}
